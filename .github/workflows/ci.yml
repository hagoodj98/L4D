name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Games Forum CI Check
    runs-on: ubuntu-latest
    env:
      PG_USER: postgres
      PG_HOST: localhost
      PG_DATABASE: forum
      PG_PASSWORD: postgres
      PG_PORT: 5432
      SESSION_SECRET: ci-session-secret
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      TWITCH_CLIENT_ID: ci-twitch-client-id
      TWITCH_CLIENT_SECRET: ci-twitch-client-secret
      DISCORD_CLIENT_ID: ci-discord-client-id
      DISCORD_CLIENT_SECRET: ci-discord-client-secret

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: forum
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d forum"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check index.js

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Initialize database schema
        run: npm run db:init
        env:
          PGPASSWORD: postgres

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npm run test:e2e
